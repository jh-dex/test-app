<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Board MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Live Board MVP</h1>
        <p>Figma 느낌의 웹 기반 실시간 작업 화면 초안</p>
      </div>
      <div class="presence" id="presence"></div>
    </header>

    <main class="layout">
      <aside class="panel">
        <h2>도구</h2>
        <label>
          이름
          <input id="displayName" maxlength="20" placeholder="닉네임" />
        </label>

        <div class="tool-row">
          <button data-tool="pen" class="is-active">펜</button>
          <button data-tool="eraser">지우개</button>
        </div>

        <label>
          색상
          <input id="colorPicker" type="color" value="#4f46e5" />
        </label>

        <label>
          브러시 크기
          <input id="brushSize" type="range" min="1" max="30" value="4" />
        </label>

        <label class="upload">
          이미지 올리기
          <input id="imageInput" type="file" accept="image/*" />
        </label>

        <div class="tool-row">
          <button id="clearCanvas">스케치 지우기</button>
          <button id="resetBoard" class="danger">보드 초기화</button>
        </div>

        <p class="hint">
          같은 브라우저에서 탭을 여러 개 열면 BroadcastChannel 기반으로 실시간 동기화가 됩니다.
        </p>
        <p class="hint">
          단축키: Space+드래그/휠클릭 드래그(이동), Ctrl/Cmd+휠 또는 +/- (확대/축소), Ctrl/Cmd+0 (리셋)
        </p>
      </aside>

      <section class="board-wrap">
        <div id="board" class="board">
          <div id="viewport" class="board-viewport">
            <div id="stage" class="board-stage">
              <div id="imageLayer" class="image-layer"></div>
              <canvas id="drawCanvas"></canvas>
            </div>
          </div>
          <div id="zoomBadge" class="zoom-badge">100%</div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
