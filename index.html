<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Sprint MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Focus Sprint</h1>
        <p>가벼운 하루 목표 관리 MVP</p>
      </header>

      <section class="card">
        <form id="goal-form" class="goal-form">
          <label for="goal-input" class="sr-only">목표 입력</label>
          <input id="goal-input" type="text" placeholder="예: 운동 30분" maxlength="80" required />
          <button type="submit">추가</button>
        </form>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">전체</button>
          <button class="filter-btn" data-filter="active">진행중</button>
          <button class="filter-btn" data-filter="done">완료</button>
        </div>
      </section>

      <section class="card">
        <ul id="goal-list" class="goal-list" aria-live="polite"></ul>
        <div class="summary">
          <span id="summary-text">총 0개 · 완료 0개</span>
          <button id="clear-done-btn" class="ghost-btn">완료 항목 정리</button>
        </div>
      </section>
    </main>

    <template id="goal-item-template">
      <li class="goal-item">
        <label>
          <input type="checkbox" class="goal-toggle" />
          <span class="goal-text"></span>
        </label>
        <button class="delete-btn" aria-label="목표 삭제">삭제</button>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
